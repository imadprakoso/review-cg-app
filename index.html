<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG Maps Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: #000000; 
            color: #F2F2F2; 
            min-height: 100vh; 
            -webkit-font-smoothing: antialiased;
        }
        
        .ios-glass { 
            background: rgba(28, 28, 30, 0.7); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        
        .ios-card {
            background-color: #1C1C1E;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .ios-input { 
            background-color: #2C2C2E; 
            border: 1.5px solid transparent; 
            transition: all 0.2s ease;
        }
        .ios-input:focus { 
            border-color: #007AFF; 
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15); 
        }

        .ios-btn-primary { background-color: #007AFF; color: white; transition: transform 0.1s ease, background-color 0.2s ease; }
        .ios-btn-primary:active { transform: scale(0.96); background-color: #005bb5; }

        .hidden-tab { display: none !important; }
        .admin-controls { display: none; }
        .admin-mode-on .admin-controls { display: flex; }
        
        /* Dynamic Island Modal Style */
        .msg-box { 
            position: fixed; 
            top: 20px; 
            left: 50%;
            transform: translateX(-50%) translateY(-150%); 
            z-index: 50; 
            padding: 12px 24px; 
            border-radius: 9999px; 
            font-weight: 500; 
            font-size: 14px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .msg-box.show { transform: translateX(-50%) translateY(0); }
        .msg-error { background-color: rgba(255, 59, 48, 0.85); color: white; }
        .msg-success { background-color: rgba(52, 199, 89, 0.85); color: white; }

        /* Animasi Glow & Float untuk Posisi 1 (Diperbarui untuk Apple Dark Theme) */
        @keyframes float-glow-ios {
            0% { transform: translateY(0px); box-shadow: 0 0 10px rgba(255, 214, 10, 0.15); }
            50% { transform: translateY(-4px); box-shadow: 0 0 25px rgba(255, 214, 10, 0.5); }
            100% { transform: translateY(0px); box-shadow: 0 0 10px rgba(255, 214, 10, 0.15); }
        }

        .rank-1 { 
            animation: float-glow-ios 3s infinite ease-in-out;
            background-color: rgba(255, 214, 10, 0.1); 
            border: 1px solid rgba(255, 214, 10, 0.3); 
        }
        .rank-2 { background-color: rgba(235, 235, 245, 0.05); border: 1px solid rgba(235, 235, 245, 0.15); }
        .rank-3 { background-color: rgba(255, 159, 10, 0.05); border: 1px solid rgba(255, 159, 10, 0.15); }
        .rank-other { background-color: #1C1C1E; border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>

<body class="p-4 md:p-8 flex flex-col items-center relative overflow-x-hidden">

    <div id="msgBox" class="msg-box">Pesan muncul di sini</div>

    <!-- CUSTOM PASSWORD MODAL -->
    <div id="adminModal" class="fixed inset-0 bg-black/60 backdrop-blur-md z-[100] hidden items-center justify-center p-4 transition-opacity duration-300">
        <div id="adminModalBox" class="bg-[#1C1C1E] border border-white/10 p-8 rounded-[24px] shadow-2xl max-w-sm w-full text-center transform scale-95 transition-transform duration-300 cubic-bezier(0.16, 1, 0.3, 1)">
            <div class="text-4xl mb-4 text-[#007AFF]"><i class="fa-solid fa-lock"></i></div>
            <h3 class="text-xl font-semibold text-white mb-1">Akses Admin</h3>
            <p class="text-[#8E8E93] text-[13px] mb-6">Masukkan PIN untuk mode pengeditan.</p>
            
            <input type="password" id="adminPassword" placeholder="••••" class="w-full px-4 py-3 bg-[#2C2C2E] rounded-xl focus:outline-none focus:ring-2 focus:ring-[#007AFF]/50 text-center text-white text-2xl tracking-[0.5em] mb-6 transition-all">
            
            <div class="flex gap-3">
                <button onclick="closeAdminModal()" class="flex-1 bg-[#2C2C2E] hover:bg-[#3A3A3C] text-[#007AFF] py-3 rounded-xl font-medium transition-colors text-[15px]">Batal</button>
                <button onclick="verifyAdmin()" class="flex-1 ios-btn-primary py-3 rounded-xl font-semibold transition-colors text-[15px]">Masuk</button>
            </div>
        </div>
    </div>

    <!-- CUSTOM CONFIRM ACTION MODAL -->
    <div id="confirmModal" class="fixed inset-0 bg-black/60 backdrop-blur-md z-[100] hidden items-center justify-center p-4">
        <div id="confirmModalBox" class="bg-[#1C1C1E] border border-white/10 p-8 rounded-[24px] shadow-2xl max-w-sm w-full text-center transform scale-95 transition-transform duration-300 cubic-bezier(0.16, 1, 0.3, 1)">
            <div id="confirmIcon" class="text-4xl mb-4 text-[#007AFF]"><i class="fa-solid fa-circle-question"></i></div>
            <h3 class="text-xl font-semibold text-white mb-1">Konfirmasi</h3>
            <p id="confirmMessage" class="text-[#8E8E93] text-[13px] mb-6">Apakah Anda yakin?</p>
            
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 bg-[#2C2C2E] hover:bg-[#3A3A3C] text-[#007AFF] py-3 rounded-xl font-medium transition-colors text-[15px]">Batal</button>
                <button id="confirmYesBtn" onclick="executePendingAction()" class="flex-1 ios-btn-primary py-3 rounded-xl font-semibold transition-colors text-[15px]">Ya</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div class="w-full max-w-3xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-white mb-2">
                CG Maps Challenge
            </h1>
            <p class="text-[#8E8E93] text-sm md:text-[15px]">Kumpulkan Kelipatan 5 Poin & Tukarkan dengan hadiah!</p>
        </div>

        <!-- iOS SEGMENTED CONTROL (TABS) -->
        <div class="flex p-1 bg-[#1C1C1E] rounded-full max-w-sm mx-auto mb-8 border border-white/5">
            <button onclick="switchTab('leaderboard')" id="btn-leaderboard" class="flex-1 py-2 text-[13px] md:text-sm font-semibold rounded-full bg-[#636366] text-white shadow-sm transition-all">
                Leaderboard
            </button>
            <button onclick="switchTab('input')" id="btn-input" class="flex-1 py-2 text-[13px] md:text-sm font-medium text-[#8E8E93] hover:text-white transition-all bg-transparent">
                Tambah Poin
            </button>
        </div>

        <!-- TAB LEADERBOARD -->
        <div id="tab-leaderboard" class="ios-card p-4 md:p-8 rounded-[32px] w-full transition-opacity duration-300">
            <div class="flex justify-between items-center mb-6 md:mb-8 px-2 md:px-0">
                <h2 class="text-xl md:text-2xl font-bold tracking-tight flex items-center gap-2">
                    <i class="fa-solid fa-trophy text-[#FFD60A]"></i> Peringkat
                </h2>
                <button onclick="toggleAdminMode()" class="text-[#8E8E93] hover:text-[#007AFF] transition-colors cursor-pointer text-lg" title="Mode Admin">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>

            <div id="loading" class="text-center py-10 text-[15px] font-medium text-[#8E8E93] animate-pulse">
                <i class="fa-solid fa-circle-notch fa-spin mr-2 text-[#007AFF]"></i> Menyinkronkan data...
            </div>

            <div id="leaderboard-list" class="space-y-3 md:space-y-4"></div>
        </div>

        <!-- TAB INPUT -->
        <div id="tab-input" class="ios-card p-6 md:p-10 rounded-[32px] w-full hidden-tab transition-opacity duration-300">
            <h2 class="text-xl md:text-2xl font-bold tracking-tight mb-2 text-center">Staging Area</h2>
            <p class="text-[#8E8E93] text-sm text-center mb-8">Setor link review Google Maps kamu di sini untuk 1 poin.</p>

            <form id="reviewForm" class="space-y-5 max-w-md mx-auto">
                <div>
                    <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1">Nama Lengkap</label>
                    <input type="text" id="inputName" required placeholder="Budi Susanto" class="ios-input w-full px-4 py-3.5 text-white placeholder-[#636366] rounded-xl text-[15px] outline-none">
                </div>
                <div>
                    <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1">Link Review Maps <span class="text-[#FF3B30]">*</span></label>
                    <input type="url" id="inputLink" required placeholder="https://goo.gl/maps/..." class="ios-input w-full px-4 py-3.5 text-white placeholder-[#636366] rounded-xl text-[15px] outline-none">
                </div>
                <div>
                    <label class="block text-[13px] font-medium text-[#8E8E93] mb-1.5 ml-1">Screenshot Bukti <span class="text-[#636366]">(opsional)</span></label>
                    <input type="file" id="inputImage" accept="image/*" class="ios-input w-full px-4 py-2.5 text-white rounded-xl text-[13px] outline-none file:mr-4 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:text-[12px] file:font-medium file:bg-[#007AFF]/10 file:text-[#007AFF] hover:file:bg-[#007AFF]/20 cursor-pointer transition-all">
                </div>
                <button type="submit" id="submitBtn" class="w-full ios-btn-primary mt-6 py-3.5 rounded-xl font-semibold text-[16px]">
                    Kirim & Dapatkan Poin
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxEkkorYYko93Ihip3Cyi1HsiSM2NAaIFbKiU9b1BgQBEFI9XQjd8lPL1n7tjDcCpbGAg/exec";
        let globalData = []; 

        function switchTab(tabName) {
            const tabLeaderboard = document.getElementById('tab-leaderboard');
            const tabInput = document.getElementById('tab-input');
            const btnLeaderboard = document.getElementById('btn-leaderboard');
            const btnInput = document.getElementById('btn-input');

            const activeClass = "flex-1 py-2 text-[13px] md:text-sm font-semibold rounded-full bg-[#636366] text-white shadow-sm transition-all";
            const inactiveClass = "flex-1 py-2 text-[13px] md:text-sm font-medium text-[#8E8E93] hover:text-white transition-all bg-transparent";

            if (tabName === 'leaderboard') {
                tabLeaderboard.classList.remove('hidden-tab');
                tabInput.classList.add('hidden-tab');
                btnLeaderboard.className = activeClass;
                btnInput.className = inactiveClass;
                fetchData(); 
            } else {
                tabLeaderboard.classList.add('hidden-tab');
                tabInput.classList.remove('hidden-tab');
                btnLeaderboard.className = inactiveClass;
                btnInput.className = activeClass;
            }
        }

        function showMessage(text, type) {
            const msgBox = document.getElementById('msgBox');
            msgBox.innerText = text;
            msgBox.className = `msg-box show ${type === 'error' ? 'msg-error' : 'msg-success'}`;
            setTimeout(() => { msgBox.classList.remove('show'); }, 3000);
        }

        async function fetchData() {
            const loadingEl = document.getElementById('loading');
            const listEl = document.getElementById('leaderboard-list');
            
            loadingEl.style.display = 'block';
            loadingEl.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2 text-[#007AFF]"></i> Menyinkronkan data...';
            listEl.innerHTML = '';

            try {
                const response = await fetch(API_URL + "?nocache=" + new Date().getTime());
                const textData = await response.text();
                
                try {
                    globalData = JSON.parse(textData);
                    renderLeaderboard(globalData);
                } catch (jsonErr) {
                    console.error("Bukan JSON:", textData);
                    loadingEl.innerHTML = "⚠️ Akses ditolak. Pastikan URL API benar dan pengaturan Apps Script diatur ke 'Anyone'.";
                }
            } catch (error) {
                console.error("Gagal Fetch:", error);
                loadingEl.innerHTML = "⚠️ Gagal tersambung ke server Apple/Google. Cek koneksi internet.";
            }
        }

        function renderLeaderboard(data) {
            document.getElementById('loading').style.display = 'none';
            const listEl = document.getElementById('leaderboard-list');
            listEl.innerHTML = '';

            if (data.length === 0) {
                listEl.innerHTML = '<div class="text-center py-10 text-[#8E8E93] font-medium text-[15px]">Belum ada data peserta.</div>';
                return;
            }

            data.forEach((participant, index) => {
                const rank = index + 1;
                let extraClasses = 'rank-other';
                let icon = `<span class="text-lg md:text-xl font-bold text-[#636366]">#${rank}</span>`;
                let statusBadge = '';
                
                // Rank Styling & Badges (Lencana)
                if (rank === 1) { 
                    extraClasses = 'rank-1'; 
                    icon = '<span class="text-xl md:text-2xl text-[#FFD60A]"><i class="fa-solid fa-crown"></i></span>'; 
                    statusBadge = '<span class="bg-[#FFD60A]/10 text-[#FFD60A] px-2.5 py-1 rounded-md text-[10px] md:text-xs font-semibold border border-[#FFD60A]/20 whitespace-nowrap">🥇 Juara Bertahan</span>';
                } else if (rank === 2) { 
                    extraClasses = 'rank-2'; 
                    icon = '<span class="text-xl md:text-2xl text-[#D1D1D6]"><i class="fa-solid fa-medal"></i></span>'; 
                    statusBadge = '<span class="bg-[#D1D1D6]/10 text-[#D1D1D6] px-2.5 py-1 rounded-md text-[10px] md:text-xs font-semibold border border-[#D1D1D6]/20 whitespace-nowrap">🥈 Posisi Aman</span>';
                } else if (rank === 3) { 
                    extraClasses = 'rank-3'; 
                    icon = '<span class="text-xl md:text-2xl text-[#FF9F0A]"><i class="fa-solid fa-award"></i></span>'; 
                    statusBadge = '<span class="bg-[#FF9F0A]/10 text-[#FF9F0A] px-2.5 py-1 rounded-md text-[10px] md:text-xs font-semibold border border-[#FF9F0A]/20 whitespace-nowrap">🥉 Mengejar</span>';
                } else {
                    statusBadge = '<span class="bg-[#FF2D55]/10 text-[#FF2D55] px-2.5 py-1 rounded-md text-[10px] md:text-xs font-semibold border border-[#FF2D55]/20 whitespace-nowrap">🔥 On Fire</span>';
                }

                // Apple Style Claim Badge (Data Kelipatan)
                let claimColor = participant.availableClaims > 0 ? "text-[#34C759] font-semibold" : "text-[#8E8E93]";
                let pulseClass = participant.availableClaims > 0 ? "border-[#34C759]/30 bg-[#34C759]/10 shadow-sm" : "border-white/5 bg-[#2C2C2E]";
                
                let claimDisplayHtml = `
                    <div class="mt-1 text-[11px] px-2.5 py-1 rounded-md inline-flex items-center gap-1.5 w-fit border ${pulseClass}">
                        <span class="text-[#EBEBF5] whitespace-nowrap">Claim: <strong class="text-[#007AFF]">${participant.claimedCount}x</strong></span>
                        <span class="text-[#636366] text-[9px]">|</span>
                        <span class="${claimColor} whitespace-nowrap">Sisa: <strong>${participant.availableClaims}x</strong></span>
                    </div>
                `;

                const safeName = participant.name.replace(/'/g, "\\'").replace(/"/g, "&quot;");

                // Admin Controls (iOS Style Buttons)
                let adminClaimBtn = '';
                if (participant.availableClaims > 0) {
                    adminClaimBtn = `
                        <button onclick="sendAdminAction('${safeName}', 'claim')" class="bg-[#34C759]/10 text-[#34C759] hover:bg-[#34C759] hover:text-white px-3 py-1.5 rounded-lg transition-colors cursor-pointer text-xs font-semibold flex items-center justify-center gap-1.5 shrink-0" title="ACC 1 Reward">
                            <i class="fa-solid fa-gift"></i> ACC
                        </button>
                    `;
                }

                const avatarUrl = `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(participant.name)}&backgroundColor=transparent`;

                // Layout Baru Responsif (Apple Style)
                const cardHtml = `
                    <div class="flex flex-col md:flex-row p-3 md:p-4 rounded-2xl ${extraClasses} transition-all gap-3 md:gap-5 relative overflow-hidden items-start md:items-center justify-between">
                        
                        <div class="flex items-center gap-3 w-full md:w-auto md:flex-1">
                            <div class="w-8 text-center shrink-0 flex justify-center">${icon}</div>
                            <img src="${avatarUrl}" alt="avatar" class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-[#2C2C2E] border border-white/10 shrink-0">
                            
                            <div class="flex flex-col min-w-0 flex-1">
                                <div class="flex items-center gap-2">
                                    <span class="text-[16px] md:text-lg font-semibold text-white truncate leading-tight">${participant.name}</span>
                                    <div class="hidden md:block">${statusBadge}</div>
                                </div>
                                <div class="md:hidden mt-1">${statusBadge}</div>
                                <div class="hidden md:block mt-0.5">${claimDisplayHtml}</div>
                            </div>

                            <div class="md:hidden text-[#007AFF] font-bold text-xl shrink-0 flex items-baseline gap-0.5">
                                ${participant.score}<span class="text-[10px] font-medium text-[#8E8E93] pb-0.5">pts</span>
                            </div>
                        </div>

                        <div class="md:hidden pl-[60px] w-full">
                            ${claimDisplayHtml}
                        </div>

                        <div class="flex items-center justify-end w-full md:w-auto gap-3 mt-1 pt-3 md:pt-0 border-t border-white/5 md:border-0">
                            
                            <div class="hidden md:flex text-[#007AFF] font-bold text-2xl shrink-0 items-baseline gap-1">
                                ${participant.score} <span class="text-[12px] font-medium text-[#8E8E93] pb-1">pts</span>
                            </div>
                            
                            <div class="admin-controls flex-row items-center justify-end gap-1.5 w-full md:w-auto">
                                ${adminClaimBtn}
                                <button onclick="sendAdminAction('${safeName}', 'decrease')" class="bg-[#FF9F0A]/10 text-[#FF9F0A] hover:bg-[#FF9F0A] hover:text-white w-8 h-8 flex items-center justify-center rounded-lg transition-colors cursor-pointer shrink-0" title="Kurangi Poin (-1)">
                                    <i class="fa-solid fa-minus text-sm"></i>
                                </button>
                                <button onclick="sendAdminAction('${safeName}', 'delete')" class="bg-[#FF3B30]/10 text-[#FF3B30] hover:bg-[#FF3B30] hover:text-white w-8 h-8 flex items-center justify-center rounded-lg transition-colors cursor-pointer shrink-0" title="Hapus User">
                                    <i class="fa-solid fa-trash text-sm"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                listEl.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        document.getElementById('reviewForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const nameInput = document.getElementById('inputName').value.trim();
            const linkInput = document.getElementById('inputLink').value.trim();
            const btn = document.getElementById('submitBtn');

            let isDuplicate = false;
            let submittedBy = "";
            for (let p of globalData) {
                if (p.links && p.links.includes(linkInput)) {
                    isDuplicate = true;
                    submittedBy = p.name;
                    break;
                }
            }

            if (isDuplicate) {
                showMessage(`Link sudah dipakai oleh ${submittedBy}`, 'error');
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Mengirim...';
            btn.disabled = true;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'add', name: nameInput, link: linkInput })
                });

                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#007AFF', '#34C759', '#FFD60A'] });

                showMessage('Poin berhasil ditambahkan', 'success');
                document.getElementById('reviewForm').reset();
                setTimeout(() => { switchTab('leaderboard'); }, 2000);

            } catch (error) {
                showMessage('Gagal terhubung ke server', 'error');
            } finally {
                btn.innerHTML = 'Kirim & Dapatkan Poin';
                btn.disabled = false;
            }
        });

        function toggleAdminMode() { 
            const isAdminOn = document.body.classList.contains('admin-mode-on');
            
            if (isAdminOn) {
                document.body.classList.remove('admin-mode-on');
                showMessage('Mode edit dimatikan', 'success');
            } else {
                const modal = document.getElementById('adminModal');
                const box = document.getElementById('adminModalBox');
                const pwInput = document.getElementById('adminPassword');
                
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                
                setTimeout(() => box.classList.replace('scale-95', 'scale-100'), 10);
                pwInput.value = '';
                pwInput.focus();
            }
        }

        function closeAdminModal() {
            const modal = document.getElementById('adminModal');
            const box = document.getElementById('adminModalBox');
            
            box.classList.replace('scale-100', 'scale-95');
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300);
        }

        function verifyAdmin() {
            const pw = document.getElementById('adminPassword').value;
            if (pw === "1155") {
                document.body.classList.add('admin-mode-on');
                showMessage('Akses admin diberikan', 'success');
                closeAdminModal();
            } else {
                showMessage('PIN tidak valid', 'error');
                closeAdminModal();
            }
        }

        document.getElementById('adminPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyAdmin();
        });

        let pendingAdminAction = null;

        function sendAdminAction(userName, actionType) {
            let confirmMsg = "";
            let iconHtml = '<i class="fa-solid fa-circle-question"></i>';
            let iconColor = 'text-[#007AFF]';
            let btnClass = 'flex-1 ios-btn-primary py-3 rounded-xl font-semibold transition-colors text-[15px]';

            if (actionType === 'delete') {
                confirmMsg = `Hapus semua data untuk <strong>${userName}</strong>? Tindakan ini tidak dapat dibatalkan.`;
                iconHtml = '<i class="fa-solid fa-trash"></i>';
                iconColor = 'text-[#FF3B30]';
                btnClass = 'flex-1 bg-[#FF3B30] hover:bg-[#D70015] text-white py-3 rounded-xl font-semibold transition-colors text-[15px]';
            } else if (actionType === 'decrease') {
                confirmMsg = `Kurangi 1 poin dari <strong>${userName}</strong>?`;
                iconHtml = '<i class="fa-solid fa-minus"></i>';
                iconColor = 'text-[#FF9F0A]';
                btnClass = 'flex-1 bg-[#FF9F0A] hover:bg-[#D08200] text-white py-3 rounded-xl font-semibold transition-colors text-[15px]';
            } else if (actionType === 'claim') {
                confirmMsg = `Catat pemberian 1 reward untuk <strong>${userName}</strong>?<br><span class="text-xs text-[#8E8E93] mt-2 block font-normal">Angka 'Sudah Claim' akan bertambah 1.</span>`;
                iconHtml = '<i class="fa-solid fa-gift"></i>';
                iconColor = 'text-[#34C759]';
                btnClass = 'flex-1 bg-[#34C759] hover:bg-[#248A3D] text-white py-3 rounded-xl font-semibold transition-colors text-[15px]';
            }

            document.getElementById('confirmIcon').innerHTML = iconHtml;
            document.getElementById('confirmIcon').className = `text-4xl mb-4 ${iconColor}`;
            document.getElementById('confirmMessage').innerHTML = confirmMsg;
            document.getElementById('confirmYesBtn').className = btnClass;

            pendingAdminAction = async function() {
                closeConfirmModal();
                document.getElementById('loading').style.display = 'block';
                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: actionType, name: userName })
                    });
                    showMessage('Berhasil diperbarui', 'success');
                    setTimeout(fetchData, 1500); 
                } catch (error) {
                    showMessage('Gagal menyimpan', 'error');
                }
            };

            const modal = document.getElementById('confirmModal');
            const box = document.getElementById('confirmModalBox');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => box.classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeConfirmModal() {
            const modal = document.getElementById('confirmModal');
            const box = document.getElementById('confirmModalBox');
            box.classList.replace('scale-100', 'scale-95');
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
                pendingAdminAction = null;
            }, 300);
        }

        function executePendingAction() {
            if (pendingAdminAction) pendingAdminAction();
        }

        fetchData();
    </script>
</body>

</html>
