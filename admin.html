<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Maps Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: #F2F2F2; min-height: 100vh; }
        .ios-card { background-color: #1C1C1E; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .ios-input { background-color: #2C2C2E; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; outline: none; }
        .ios-input:focus { border-color: #007AFF; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2); }
        /* Modal Styles */
        .modal { backdrop-filter: blur(10px); background: rgba(0,0,0,0.6); }
        .modal-content { background: #1C1C1E; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; width: 320px; padding: 24px; text-align: center; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        th { color: #8E8E93; font-size: 12px; padding: 12px 16px; border-bottom: 1px solid #333; text-align: left; }
        td { padding: 16px; border-bottom: 1px solid #333; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <!-- MODAL KONFIRMASI APPLE STYLE -->
    <div id="actionModal" class="modal fixed inset-0 z-50 hidden items-center justify-center">
        <div class="modal-content shadow-2xl">
            <h3 id="modalTitle" class="text-lg font-semibold text-white mb-2">Konfirmasi</h3>
            <p id="modalDesc" class="text-gray-400 text-sm mb-6"></p>
            <div id="modalInputArea" class="hidden mb-4"><input type="text" id="modalInput" class="ios-input w-full p-2 text-white"></div>
            <div class="flex gap-2">
                <button onclick="hideModal()" class="flex-1 bg-[#2C2C2E] py-2 rounded-xl text-sm font-medium text-white">Batal</button>
                <button id="modalConfirmBtn" class="flex-1 bg-[#007AFF] py-2 rounded-xl text-sm font-bold text-white">Ya</button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-6xl flex flex-col gap-6">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-3xl font-bold text-white">Control Center</h1>
            <a href="index.html" class="bg-[#2C2C2E] px-4 py-2 rounded-lg text-sm text-white">Kembali ke Web</a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="ios-card p-6">
                <h3 class="text-lg font-semibold mb-4">Pengaturan Cabang</h3>
                <input type="text" id="newBranchInput" placeholder="Nama cabang baru..." class="ios-input w-full p-2 mb-2 rounded-lg">
                <button onclick="addBranch()">Tambah Cabang</button>
            </div>

            <div class="lg:col-span-2 ios-card p-6">
                <select id="filterDivisi" onchange="filterTable()" class="ios-input p-2 rounded-lg text-white mb-4">
                    <option value="ALL">Semua Divisi</option>
                </select>
                <table class="w-full">
                    <thead><tr><th>Divisi</th><th>Nama</th><th>Poin</th><th>Claimed</th><th>Aksi</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwj8uI-0hkNcK9t_VC9Kssi5JHEsxzT9TliCWqXPJBs_FQng7d8ObAIiOE2vWek6LWR6g/exec";
        let globalRawData = [];

        async function fetchAdminData() {
            const res = await fetch(`${API_URL}?action=getAdminData`);
            const json = await res.json();
            globalRawData = json.data;
            renderTable(globalDataAccumulated(globalRawData));
        }

        function globalDataAccumulated(data) {
            const grouped = {};
            data.forEach(item => {
                const key = `${item.branch}_${item.name}`;
                if (!grouped[key]) grouped[key] = { ...item, score: 0, claims: 0 };
                grouped[key].score += Number(item.poin);
                grouped[key].claims += Number(item.claim);
            });
            return Object.values(grouped);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>${r.branch}</td>
                    <td>${r.nama}</td>
                    <td class="font-bold text-[#34C759]">${r.score}</td>
                    <td>
                        <div class="text-[#007AFF]">${r.claims}x</div>
                        <div class="text-[10px] text-[#8E8E93]">Sisa: ${Math.floor(r.score/5) - r.claims}x</div>
                    </td>
                    <td>
                        <button class="btn-edit" onclick="showModal('edit', '${r.nama}', '${r.branch}')">Edit</button>
                        <button class="btn-danger" onclick="showModal('delete', '${r.nama}', '${r.branch}')">Hapus</button>
                        <button class="btn-edit" onclick="showModal('claim', '${r.nama}', '${r.branch}')">🎁</button>
                    </td>
                </tr>
            `).join('');
        }

        // Logic Modal Apple Style
        function showModal(action, name, branch) {
            const modal = document.getElementById('actionModal');
            const title = document.getElementById('modalTitle');
            const desc = document.getElementById('modalDesc');
            const btn = document.getElementById('modalConfirmBtn');
            const inputArea = document.getElementById('modalInputArea');

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            if(action === 'edit') {
                title.innerText = "Edit Nama";
                inputArea.classList.remove('hidden');
                btn.onclick = () => performAction(action, name, branch, document.getElementById('modalInput').value);
            } else {
                title.innerText = "Konfirmasi";
                desc.innerText = `Yakin ingin ${action} data ${name}?`;
                btn.onclick = () => performAction(action, name, branch);
            }
        }

        function hideModal() { document.getElementById('actionModal').classList.add('hidden'); }

        async function performAction(action, name, branch, newName = "") {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action, name, branch, newName })
            });
            hideModal();
            fetchAdminData();
        }

        loadAdminData();
    </script>
</body>
</html>
